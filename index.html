<!-- Existing controls -->
<div class="controls">
    <!-- Existing buttons here... -->
    <button onclick="relayOn()">Relay On</button>
    <button onclick="relayOff()">Relay Off</button>
</div>

<script>
function relayOn() {
    fetch('/cgi-bin/relay-on')
        .then(response => response.json())
        .then(data => console.log(data));
}

function relayOff() {
    fetch('/cgi-bin/relay-off')
        .then(response => response.json())
        .then(data => console.log(data));
}
</script>
