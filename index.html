<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skunk Works Pi Control</title>

<style>
    body {
        background: url("skunk-bg.jpg") no-repeat center center fixed;
        background-size: cover;
        color: #eee;
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    h1 {
        font-family: "Courier New", monospace;
        font-size: 32px;
        letter-spacing: 4px;
        text-shadow: 0 0 10px black;
        margin: 10px 0 5px 0;
    }

    .controls {
        margin-top: 5px;
    }

    button {
        padding: 8px 18px;
        margin: 5px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: rgba(0,0,0,0.6);
        color: white;
        backdrop-filter: blur(4px);
        box-shadow: 0 0 10px black;
    }

    #output {
        margin-top: 10px;
        font-size: 16px;
        text-shadow: 0 0 5px black;
    }

    #preview, #live {
        margin-top: 15px;
        max-width: 95%;
        max-height: 70vh;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        object-fit: contain;
    }

    #live {
        display: none;
    }
</style>

</head>
<body>

<h1>SKUNK WORKS CONTROL</h1>

<div class="controls">
    <button onclick="netCheck()">🌐Network</button>
    <button onclick="capture()">📸Cheese</button>
    <button onclick="readsensor()">📟Volts</button>
    <button onclick="readLight()">💡Lumen</button>

    <button onclick="relayOn()">⚡Relay ON</button>
    <button onclick="relayOff()">❌Relay OFF</button>

    <button onclick="phoneLightOn()">📱🔦Lens ON</button>
    <button onclick="phoneLightOff()">📱❌Lens OFF</button>

    <button onclick="cleanup()">🧹Clean</button>
</div>

<div id="output"></div>

<img id="preview" src="" alt="Latest photo will appear here">
<video id="live" autoplay muted playsinline controls src="/live.m3u8"></video>

<script>

let liveMode = false;

/* -------------------------
   LOAD LATEST IMAGE
------------------------- */
function loadLatestImage() {
    fetch("latest.txt")
        .then(r => r.text())
        .then(filename => {
            filename = filename.trim();
            if (filename.length > 0) {
                document.getElementById("preview").src = filename + "?t=" + Date.now();
            }
        });
}

/* -------------------------
   PHOTO CAPTURE
------------------------- */
function capture() {
    showPhoto();

    fetch("/cgi-bin/capture.sh")
        .then(r => r.text())
        .then(t => {
            document.getElementById("output").innerText = t;

            const parts = t.split(":");
            if (parts.length === 2) {
                const file = parts[1].trim();
                document.getElementById("preview").src = file + "?t=" + Date.now();
            }
        });
}

/* -------------------------
   SENSOR READ
------------------------- */
function readsensor() {
    fetch("/cgi-bin/sensor.sh")
        .then(r => r.text())
        .then(t => {
            document.getElementById("output").innerText = t;
        });
}

function readLight() {
    fetch("/cgi-bin/read_light.py")
        .then(r => r.text())
        .then(t => {
            document.getElementById("output").innerText = t;
        });
}

/* -------------------------
   LIVE VIDEO
------------------------- */
function toggleLive() {
    if (liveMode) {
        showPhoto();
    } else {
        showLive();
    }
}

function showLive() {
    liveMode = true;

    const live = document.getElementById("live");
    const preview = document.getElementById("preview");

    preview.style.display = "none";
    live.style.display = "block";

    live.src = "http://" + location.hostname + ":8081";
}

function showPhoto() {
    liveMode = false;

    const live = document.getElementById("live");
    const preview = document.getElementById("preview");

    live.style.display = "none";
    preview.style.display = "block";

    live.src = "";
}

/* -------------------------
   RELAY CONTROL
------------------------- */
function relayOn() {
    fetch("/cgi-bin/relayon.sh")
        .then(r => r.text())
        .then(t => {
            document.getElementById("output").innerText = t;
        });
}

function relayOff() {
    fetch("/cgi-bin/relayoff.sh")
        .then(r => r.text())
        .then(t => {
            document.getElementById("output").innerText = t;
        });
}

/* -------------------------
   PHONE FLASHLIGHT
------------------------- */
function phoneLightOn() {
    fetch("/cgi-bin/phonelight1")
        .then(r => r.text())
        .then(t => {
            document.getElementById("output").innerText = t;
        });
}

function phoneLightOff() {
    fetch("/cgi-bin/phonelight0")
        .then(r => r.text())
        .then(t => {
            document.getElementById("output").innerText = t;
        });
}

/* -------------------------
   CLEANUP
------------------------- */
function cleanup() {
    fetch("/cgi-bin/cleanup.sh")
        .then(r => r.text())
        .then(t => {
            document.getElementById("output").innerText = t;
        });
}

/* -------------------------
   NETWORK CHECK
------------------------- */
function netCheck() {
    showPhoto();

    fetch("/cgi-bin/netcheck.sh")
        .then(r => r.text())
        .then(t => {
            document.getElementById("preview").style.display = "none";
            document.getElementById("live").style.display = "none";
            document.getElementById("output").innerHTML = t;
        });
}

/* -------------------------
   INIT
------------------------- */
loadLatestImage();

</script>

</body>
</html>
